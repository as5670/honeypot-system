<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Honeypot Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🛡️ Honeypot Attack Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2>Total Attempts</h2>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h2>Top Username</h2>
            <p id="topUser">-</p>
        </div>

    </div>

    <div class="card full">
        <h2>Username Attempts</h2>
        <ul id="userList"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
